<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatLog 插件</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <!-- 登录界面 -->
    <div id="loginContainer" class="container">
        <div class="logo">ChatLog <span>TT&LL</span></div>
        <h2>登录</h2>
        
        <div class="error-message" id="loginError"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="loginAccount">账号</label>
                <input type="text" id="loginAccount" name="userAccount" placeholder="请输入账号" required>
            </div>
            
            <div class="form-group">
                <label for="loginPassword">密码</label>
                <input type="password" id="loginPassword" name="userPassword" placeholder="请输入密码" required>
            </div>
            
            <button type="submit" class="submit-button" id="loginButton">登录</button>
        </form>
        
        <div class="register-link">
            还没有账号？ <a href="#" id="showRegister">立即注册</a>
        </div>
        
        <div class="config-link">
            <a href="#" id="showConfig">接口配置</a>
        </div>
    </div>

    <!-- 注册界面 -->
    <div id="registerContainer" class="container" style="display: none;">
        <div class="logo">ChatLog <span>TT&LL</span></div>
        <h2>注册</h2>
        
        <div class="error-message" id="registerError"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="registerAccount">账号</label>
                <input type="text" id="registerAccount" name="userAccount" placeholder="请输入账号" required>
            </div>
            
            <div class="form-group">
                <label for="registerPassword">密码</label>
                <input type="password" id="registerPassword" name="userPassword" placeholder="请输入密码" required>
            </div>
            
            <div class="form-group">
                <label for="registerCheckPassword">确认密码</label>
                <input type="password" id="registerCheckPassword" name="checkPassword" placeholder="请确认密码" required>
            </div>
            
            <button type="submit" class="submit-button" id="registerButton">注册</button>
        </form>
        
        <div class="login-link">
            已经有账号？ <a href="#" id="showLogin">立即登录</a>
        </div>
    </div>

    <!-- 主功能界面 -->
    <div id="mainContainer" class="container" style="display: none;">
        <div class="header">
            <div class="logo">ChatLog <span>TT&LL</span></div>
            <div class="user-info">
                <span id="userName"></span>
                <button id="logoutButton" class="logout-button">登出</button>
            </div>
        </div>
        
        <div class="content">
            <h2>插件功能</h2>
            <p>欢迎使用 ChatLog 插件！</p>
            <p>本插件可以帮助您提升AI对话的浏览效率，轻松管理长对话历史，快速定位重要信息。</p>
            
            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-icon">📝</div>
                    <div class="feature-text">提取历史对话</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🔍</div>
                    <div class="feature-text">关键词搜索</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📁</div>
                    <div class="feature-text">文件消息处理</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📏</div>
                    <div class="feature-text">可拖动调整</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🚀</div>
                    <div class="feature-text">快速跳转</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🌐</div>
                    <div class="feature-text">跨平台支持</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 接口配置界面 -->
    <div id="configContainer" class="container" style="display: none;">
        <div class="logo">ChatLog <span>TT&LL</span></div>
        <h2>接口配置</h2>
        
        <div class="success-message" id="configSuccess"></div>
        
        <form id="configForm">
            <div class="form-group">
                <label for="apiIp">API IP</label>
                <input type="text" id="apiIp" name="apiIp" placeholder="请输入API IP" required>
            </div>
            
            <div class="form-group">
                <label for="apiPort">API 端口</label>
                <input type="number" id="apiPort" name="apiPort" placeholder="请输入API端口" required>
            </div>
            
            <button type="submit" class="submit-button" id="configButton">保存配置</button>
        </form>
        
        <div class="back-link">
            <a href="#" id="backToLogin">返回登录</a>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
