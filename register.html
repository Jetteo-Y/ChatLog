<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - ChatLog</title>
    <style>
        :root {
            --primary-color: #0071e3;
            --secondary-color: #f5f5f7;
            --text-color: #1d1d1f;
            --text-secondary: #86868b;
            --border-color: #d2d2d7;
            --background-color: #ffffff;
            --card-background: #f5f5f7;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--background-color);
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            transition: var(--transition);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-color);
            text-decoration: none;
        }

        .logo span {
            color: var(--primary-color);
            margin-left: 5px;
            font-style: italic;
            font-weight: 400;
            font-size: 14px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        .cta-button {
            background-color: var(--primary-color);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
        }

        .cta-button:hover {
            background-color: #0077ed;
            transform: translateY(-2px);
        }

        /* 注册区域 */
        .register-section {
            margin-top: 64px;
            padding: 100px 0;
            background: linear-gradient(135deg, #f5f5f7 0%, #ffffff 100%);
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
        }

        .register-card {
            background-color: white;
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 40px;
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
            transition: var(--transition);
        }

        .register-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        .register-card h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
            color: var(--text-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: var(--transition);
            background-color: var(--background-color);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-secondary);
        }

        .error-message {
            background-color: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background-color: rgba(52, 199, 89, 0.1);
            color: #34c759;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .submit-button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 20px;
        }

        .submit-button:hover {
            background-color: #0077ed;
            transform: translateY(-2px);
        }

        .submit-button:disabled {
            background-color: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* 页脚 */
        .footer {
            padding: 30px 0;
            background-color: var(--text-color);
            color: white;
        }

        .footer-content {
            text-align: center;
        }

        .footer-content p {
            font-size: 14px;
            color: #86868b;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .register-card {
                padding: 30px 20px;
                margin: 0 20px;
            }

            .register-section {
                padding: 60px 0;
            }
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">ChatLog <span>TT&LL</span></a>
            <ul class="nav-links">
                <li><a href="index.html#features">功能</a></li>
                <li><a href="index.html#tech">技术</a></li>
                <li><a href="index.html#platforms">平台</a></li>
                <li><a href="index.html#installation">安装</a></li>
            </ul>
            <a href="login.html" class="cta-button">登录</a>
        </div>
    </nav>

    <!-- 注册区域 -->
    <section class="register-section">
        <div class="container">
            <div class="register-card fade-in-up">
                <h2>注册</h2>
                
                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label for="userAccount">账号</label>
                        <input type="text" id="userAccount" name="userAccount" placeholder="请输入账号" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="userPassword">密码</label>
                        <input type="password" id="userPassword" name="userPassword" placeholder="请输入密码" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="checkPassword">确认密码</label>
                        <input type="password" id="checkPassword" name="checkPassword" placeholder="请确认密码" required>
                    </div>
                    
                    <button type="submit" class="submit-button" id="registerButton">注册</button>
                </form>
                
                <div class="login-link">
                    已经有账号？ <a href="login.html">立即登录</a>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 ChatLog. 保留所有权利。</p>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('registerForm');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const registerButton = document.getElementById('registerButton');

            registerForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const userAccount = document.getElementById('userAccount').value;
                const userPassword = document.getElementById('userPassword').value;
                const checkPassword = document.getElementById('checkPassword').value;
                
                // 表单验证
                if (userPassword !== checkPassword) {
                    errorMessage.textContent = '密码和确认密码不一致';
                    errorMessage.style.display = 'block';
                    return;
                }
                
                // 显示加载状态
                registerButton.disabled = true;
                registerButton.textContent = '注册中...';
                
                // 隐藏之前的消息
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';
                
                // 调用注册接口
                fetch('/api/user/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userAccount: userAccount,
                        userPassword: userPassword,
                        checkPassword: checkPassword
                    })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('注册失败');
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.code === 0) {
                        // 注册成功
                        successMessage.textContent = '注册成功，正在跳转...';
                        successMessage.style.display = 'block';
                        
                        // 跳转到登录页面
                        setTimeout(function() {
                            window.location.href = 'login.html';
                        }, 1500);
                    } else {
                        // 注册失败
                        errorMessage.textContent = data.message || '注册失败，请稍后重试';
                        errorMessage.style.display = 'block';
                        registerButton.disabled = false;
                        registerButton.textContent = '注册';
                    }
                })
                .catch(error => {
                    // 网络错误或其他错误
                    errorMessage.textContent = '注册失败，请稍后重试';
                    errorMessage.style.display = 'block';
                    registerButton.disabled = false;
                    registerButton.textContent = '注册';
                });
            });

            // 导航栏滚动效果
            window.addEventListener('scroll', function() {
                const navbar = document.querySelector('.navbar');
                if (window.scrollY > 100) {
                    navbar.style.background-color = 'rgba(255, 255, 255, 0.98)';
                    navbar.style.boxShadow = '0 2px 10px rgba(0, 0, 0, 0.05)';
                } else {
                    navbar.style.background-color = 'rgba(255, 255, 255, 0.95)';
                    navbar.style.boxShadow = 'none';
                }
            });
        });
    </script>
</body>
</html>
